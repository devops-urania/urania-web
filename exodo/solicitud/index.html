<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Reclutamiento: Protocolo Éxodo</title>
    <style>
        /* Estilos globales y de fondo (Mantenidos de la versión anterior) */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            width: 100vw;
            background-color: #222;
            color: #222;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
        }

        /* Contenedor principal estilo documento */
        #dossier-screen {
            position: relative;
            background-color: #e6e3da; 
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1IiBoZWlnaHQ9IjUiPgo8cmVjdCB3aWR0aD0iNSIgaGVpZ2h0PSI1IiBmaWxsPSIjZTZlM2RhIi8+CjxjaXJjbGUgY3g9IjEuNSIgY3k9IjEuNSIgcj0iMSIgZmlsbD0iI2QxYzlhMiIgZmlsbC1vcGFjaXR5PSIwLjIyIi8+Cjwvc3ZnPg==');
            padding: 40px;
            box-sizing: border-box;
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
            width: 100%;
            max-width: 800px;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            margin: 20px;
        }

        .hidden {
            display: none !important;
        }

        /* Recreación del grid y las marcas de alineación */
        .grid-overlay {
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(0,0,0,0.15);
            pointer-events: none;
            z-index: 0;
        }

        .mark {
            position: absolute;
            width: 15px;
            height: 15px;
            border: 1px solid rgba(0,0,0,0.2);
            border-radius: 50%;
        }
        .mark::after, .mark::before {
            content: '';
            position: absolute;
            background-color: rgba(0,0,0,0.2);
        }
        .mark::before { width: 1px; height: 100%; left: calc(50% - 0.5px); }
        .mark::after { height: 1px; width: 100%; top: calc(50% - 0.5px); }
        .mark.top-l { top: 15px; left: 15px; }
        .mark.bottom-r { bottom: 15px; right: 15px; }

        /* Bloque de metadata */
        .metadata {
            position: relative;
            text-align: left;
            line-height: 1.4;
            margin-bottom: 30px;
            z-index: 1;
            border-bottom: 2px dashed rgba(0,0,0,0.3);
            padding-bottom: 15px;
        }
        .metadata h1 { font-size: 1.3rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .censura {
            background-color: #111;
            padding: 0 10px;
            display: inline-block;
            margin-left: 5px;
            color: #111;
        }

        /* Estilos del Formulario */
        form {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex-grow: 1;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* Inputs tipo máquina de escribir - Actualizado para incluir type="tel" */
        input[type="text"], 
        input[type="number"],
        input[type="tel"],
        select {
            background: transparent;
            border: none;
            border-bottom: 2px solid #222;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            color: #222;
            padding: 5px 0;
            outline: none;
            border-radius: 0;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus, 
        input[type="number"]:focus,
        input[type="tel"]:focus,
        select:focus {
            border-bottom: 2px solid #8a0000;
        }

        /* Gadget de Color de Cabina */
        .color-gadget {
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: rgba(0, 0, 0, 0.05);
            padding: 10px;
            border: 1px dashed rgba(0, 0, 0, 0.3);
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 40px;
            height: 40px;
            cursor: pointer;
            background: transparent;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid #222;
            border-radius: 0;
        }

        .hex-display {
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        /* Botón de envío */
        .submit-btn {
            margin-top: auto;
            align-self: flex-end;
            padding: 15px 40px;
            font-family: 'Courier New', monospace;
            font-size: 1.3rem;
            font-weight: bold;
            background-color: transparent;
            border: 3px solid #111;
            color: #111;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s;
        }
        .submit-btn:hover { background-color: #111; color: #e6e3da; }

        /* Mensaje de Confirmación (Estilo Sello) */
        #confirmation-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            z-index: 2;
        }

        .stamp-message {
            font-size: 2.5rem;
            font-weight: 900;
            color: rgba(180, 0, 0, 0.9);
            text-transform: uppercase;
            line-height: 1.2;
            border: 5px solid rgba(180, 0, 0, 0.8);
            padding: 30px;
            transform: rotate(-5deg);
            text-shadow: 1px 1px 2px rgba(180, 0, 0, 0.3);
            box-shadow: inset 0 0 10px rgba(180, 0, 0, 0.2);
            max-width: 90%;
            animation: stampReveal 0.3s ease-out forwards;
            opacity: 0;
        }

        @keyframes stampReveal {
            0% { transform: scale(1.5) rotate(-15deg); opacity: 0; }
            100% { transform: scale(1) rotate(-5deg); opacity: 1; }
        }

        @media (max-width: 768px) {
            #dossier-screen { padding: 25px; margin: 10px; }
            .stamp-message { font-size: 1.5rem; padding: 20px; }
            .submit-btn { width: 100%; text-align: center; }
        }

        /* Estilos específicos para el contenedor del teléfono */
        .phone-container {
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #222;
            padding: 5px 0;
            transition: border-color 0.3s;
        }

        /* Cambia el color del borde del contenedor cuando algún input interno tiene foco */
        .phone-container:focus-within {
            border-bottom: 2px solid #8a0000;
        }

        .phone-prefix {
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            font-weight: bold;
            color: #555; /* Un tono levemente más claro para diferenciarlo de la entrada del usuario */
        }

        /* Quitamos el borde individual de estos inputs para que use el del contenedor */
        .phone-container input[type="tel"] {
            border: none;
            padding: 0;
        }

        .phone-container input[type="tel"]:focus {
            border: none;
        }

        #tel-area {
            width: 60px; /* Espacio para códigos de área de 2 a 4 dígitos */
            text-align: center;
        }

        #tel-local {
            flex-grow: 1; /* Toma el resto del espacio disponible */
        }
    </style>
</head>
<body>

    <div id="dossier-screen">
        <div class="grid-overlay">
            <div class="mark top-l"></div>
            <div class="mark bottom-r"></div>
        </div>

        <div class="metadata" id="form-metadata">
            <h1>[DOSSIER DE RECLUTAMIENTO]</h1>
            <p>Emisor: Urania <span class="censura">RESTRINGIDO</span></p>
            <p>Destino: Servidores del Protocolo Éxodo</p>
            <p>Estado: Pendiente de Ingreso de Datos</p>
        </div>

        <form id="recruitment-form" onsubmit="submitForm(event)">
        <div class="form-group">
                <label for="nombre">Nombre de Pila del Sujeto</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Ej: Juan">
            </div>

            <div class="form-group">
                <label for="apellido">Apellido del Sujeto</label>
                <input type="text" id="apellido" name="apellido" required placeholder="Ej: Pascual">
            </div>

            <div class="form-group">
                <label for="edad">Ciclos Terrestres (Edad)</label>
                <input type="number" id="edad" name="edad" required min="18" max="99" placeholder="18">
            </div>

            <div class="form-group">
                <label>Frecuencia de Enlace Directo (Teléfono)</label>
                <div class="phone-container">
                    <span class="phone-prefix">+54</span>
                    <input type="tel" id="tel-area" required placeholder="264" maxlength="3" pattern="[0-9]{2,4}">
                    <span class="phone-prefix">15</span>
                    <input type="tel" id="tel-local" required placeholder="6287562" maxlength="7" pattern="[0-9]{6,8}">
                </div>
            </div>

            <div class="form-group">
                <label>Frecuencia Espectral (Color de Cabina)</label>
                <div class="color-gadget">
                    <input type="color" id="color-cabina" value="#19E9B5">
                    <input type="text" id="color-codigo" class="hex-display" value="#19E9B5" readonly>
                </div>
            </div>

            <div class="form-group">
                <label for="ocupacion">Ocupación / Función Principal</label>
                <input type="text" id="ocupacion" name="ocupacion" required placeholder="Ej: Maestro">
            </div>

            <div class="form-group">
                <label for="afinidad-tech">Nivel de Afinidad Tech</label>
                <select id="afinidad-tech" name="afinidad_tech" required>
                    <option value="" disabled selected>Seleccione nivel...</option>
                    <option value="nulo">Nivel 0 - Analógico (Nulo)</option>
                    <option value="escaso">Nivel 1 - Operador Básico (Escaso)</option>
                    <option value="medio">Nivel 2 - Usuario Avanzado (Medio)</option>
                    <option value="alto">Nivel 3 - Integrador de Sistemas (Alto)</option>
                    <option value="experto">Nivel 4 - Arquitecto Tecnológico (Experto)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="conocimiento-ia">Conocimiento sobre IA</label>
                <select id="conocimiento-ia" name="conocimiento_ia" required>
                    <option value="" disabled selected>Seleccione nivel...</option>
                    <option value="nulo">Nulo / Desconocimiento total</option>
                    <option value="escaso">Escaso / Nivel teórico</option>
                    <option value="medio">Medio / Uso de Prompts Básicos</option>
                    <option value="alto">Alto / Implementación de Agentes/APIs</option>
                    <option value="experto">Experto / Desarrollo y Entrenamiento</option>
                </select>
            </div>

            <div class="form-group">
                <label for="conocimiento-blockchain">Conocimiento sobre Blockchain</label>
                <select id="conocimiento-blockchain" name="conocimiento_blockchain" required>
                    <option value="" disabled selected>Seleccione nivel...</option>
                    <option value="nulo">Nulo / Desconocimiento total</option>
                    <option value="escaso">Escaso / Nivel especulativo</option>
                    <option value="medio">Medio / Transacciones Básicas (Wallets)</option>
                    <option value="alto">Alto / Despliegue de Smart Contracts</option>
                    <option value="experto">Experto / Desarrollo Core y Nodos</option>
                </select>
            </div>

            <button type="submit" class="submit-btn">Transmitir Datos</button>
        </form>

        <div id="confirmation-screen" class="hidden">
            <div class="stamp-message">
                A LA BREVEDAD SERÁS CONTACTADO<br>POR EL AGENTE DE RECLUTAMIENTO<br><br>
                <span style="color: #222; font-size: 3rem;">[ COSMO ]</span><br><br>
                <span style="font-size: 1.2rem; color: #222; text-shadow: none; display: block; margin-top: 15px; border-top: 2px dashed #222; padding-top: 10px;">
                    TU CÓDIGO DE ACCESO ES:<br>
                    <span id="display-palabra-clave" style="font-size: 2rem; font-weight: bold; color: #8a0000;"></span>
                </span>
            </div>
        </div>
    </div>

    <script>
        // Sincronización del gadget de color
        const colorInput = document.getElementById('color-cabina');
        const colorCode = document.getElementById('color-codigo');

        colorInput.addEventListener('input', function() {
            colorCode.value = this.value.toUpperCase();
        });

        // Función para generar un código de acceso temático y aleatorio
        function generarPalabraClave() {
            const prefijos = ["PULSAR", "NEXO", "ZENIT", "ORBITA", "CUASAR", "NOVA", "VORTICE", "AURA", "QUARK", "VOID"];
            const prefijo = prefijos[Math.floor(Math.random() * prefijos.length)];
            const sufijo = Math.floor(Math.random() * 900) + 100; // Número entre 100 y 999
            return `${prefijo}-${sufijo}`;
        }

        // Lógica de envío del formulario conectada al Backend
        async function submitForm(event) {
            event.preventDefault(); // Evita que la página se recargue

            // Generamos la palabra clave única para esta sesión
            const codigoAcceso = generarPalabraClave();

            // Recolectar y formatear el número de teléfono (Ej: 54 + 264 + 6257373)
            const codArea = document.getElementById('tel-area').value.trim();
            const numLocal = document.getElementById('tel-local').value.trim();
            const telefonoFinal = `54${codArea}${numLocal}`;

            // Recolectamos los datos directamente de los nuevos inputs
            const payload = {
                nombre_usuario: document.getElementById('nombre').value.trim(),
                apellido_usuario: document.getElementById('apellido').value.trim(),
                edad: parseInt(document.getElementById('edad').value),
                color_cabina: document.getElementById('color-codigo').value,
                telefono: telefonoFinal,                
                ocupacion: document.getElementById('ocupacion').value.trim(),
                afinidad_tech: document.getElementById('afinidad-tech').value,
                conocimiento_ia: document.getElementById('conocimiento-ia').value,
                conocimiento_blockchain: document.getElementById('conocimiento-blockchain').value,
                palabra_clave: codigoAcceso
            };

            // Dirección del servidor (Ajustar para producción en la VPS)
            const URL_API = 'https://urania.vision/api/reclutar';

            try {
                // Transmisión de datos
                const response = await fetch(URL_API, { 
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const result = await response.json();
                    console.log("Transmisión exitosa:", result);

                    // Insertar la palabra clave en el HTML antes de mostrar la pantalla
                    document.getElementById('display-palabra-clave').innerText = codigoAcceso;

                    // Transición visual: Ocultar formulario y metadata
                    document.getElementById('recruitment-form').classList.add('hidden');
                    document.getElementById('form-metadata').classList.add('hidden');

                    // Mostrar el sello de confirmación del Agente Cosmo
                    document.getElementById('confirmation-screen').classList.remove('hidden');
                } else {
                    console.error("Fallo en la validación del servidor.");
                    alert("Error en la transmisión. Los datos no fueron aceptados por el Protocolo.");
                }
            } catch (error) {
                console.error("Error de red o conexión:", error);
                alert("Enlace de comunicación caído. No se pudo contactar con el servidor en " + URL_API);
            }
        }
    </script>
</body>
</html>
