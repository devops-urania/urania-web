<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urania | Proyecto Éxodo - Boarding Map</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['Space Grotesk', 'monospace'],
                    },
                    colors: {
                        urania: {
                            dark: '#0B1120',
                            card: '#111827',
                            cyan: '#22D3EE',
                            turq: '#0D9488',
                            yellow: '#FDF0B5',
                            yellowHover: '#FCE694'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000000; }
        .glass-panel {
            background: rgba(11, 17, 32, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(34, 211, 238, 0.2);
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="text-slate-300 font-sans antialiased h-screen w-screen relative">

    <!-- Navegación y Buscador Superior -->
    <div class="absolute top-0 w-full z-50 p-6 flex flex-col md:flex-row justify-between items-center gap-4 pointer-events-none">
        <div class="pointer-events-auto cursor-pointer" onclick="window.location.href='index.html'">
            <img src="Urania_Web06.png" alt="Urania Logo" class="h-10 w-auto object-contain drop-shadow-[0_0_10px_rgba(34,211,238,0.3)]">
        </div>

        <div class="pointer-events-auto glass-panel rounded-full px-6 py-3 flex items-center shadow-[0_0_20px_rgba(34,211,238,0.1)] transition-all focus-within:shadow-[0_0_25px_rgba(34,211,238,0.3)] focus-within:border-urania-cyan/50">
            <span class="text-urania-cyan font-mono font-semibold tracking-wider text-sm md:text-base mr-2">Boarding ID: URA-</span>
            <form id="searchForm" class="flex items-center" onsubmit="event.preventDefault(); searchStar();">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="bg-transparent text-white font-mono text-lg outline-none w-24 placeholder-slate-600 font-bold" 
                    placeholder="000" 
                    autocomplete="off"
                    maxlength="5"
                    disabled> <!-- Deshabilitado hasta que carguen los datos -->
                <button type="submit" id="searchBtn" class="ml-3 text-slate-400 hover:text-urania-yellow transition-colors" disabled>
                    <i class="fa-solid fa-satellite-dish"></i>
                </button>
            </form>
        </div>
        
        <div class="hidden md:block w-32"></div>
    </div>

    <!-- Lienzo del Mapa Estelar -->
    <canvas id="starMap" class="absolute inset-0 w-full h-full cursor-crosshair"></canvas>

    <!-- Tooltip Emergente del Usuario -->
    <div id="tooltip" class="absolute hidden px-5 py-4 rounded-xl shadow-[0_0_20px_rgba(34,211,238,0.4)] transform -translate-x-1/2 transition-all duration-300 z-40" style="background: rgba(11, 17, 32, 0.85); backdrop-filter: blur(12px); border: 1px solid;">
        <div id="arrow-down" class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-4 h-4 rotate-45 border-b border-r" style="background: #0B1120;"></div>
        <div id="arrow-up" class="absolute -top-2 left-1/2 -translate-x-1/2 w-4 h-4 rotate-45 border-t border-l hidden" style="background: #0B1120;"></div>
        
        <div class="relative z-10 text-center pointer-events-none">
            <p class="text-xs font-mono text-urania-cyan tracking-widest uppercase mb-1" id="tt-id">URA-000</p>
            <p class="text-xl font-bold text-white whitespace-nowrap" id="tt-name">Nombre Recluta</p>
            <p class="text-[10px] text-slate-400 font-mono mt-2" id="tt-coords">x: 0.0000 | y: 0.0000</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('starMap');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Variables globales
        let users = [];
        let targetUser = null;
        let animationTime = 0;

        // 1.0 es el tamaño original, 2.0 es el doble, etc.
        const ESCALA_ESTRELLAS = 2.5;
        //const ESCALA_ESTRELLAS = Math.max(1.0, 4.0 - (data.users.length / 150));

        // --- INTEGRACIÓN CON BACKEND (FETCH) ---
        async function loadUsers() {
            try {
                // Aquí llamamos a tu archivo o endpoint
                const response = await fetch('users.json');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Mapeamos los datos de la DB y les agregamos las propiedades visuales para el canvas
                users = data.users.map(u => ({
                    id: u.id,
                    name: u.name,
                    x: parseFloat(u.x), // Aseguramos que sea número
                    y: parseFloat(u.y), // Aseguramos que sea número
                    color: u.color,
                    size: (Math.random() * 2 + 1) * ESCALA_ESTRELLAS,   // Tamaño aleatorio de la estrella
                    phase: Math.random() * Math.PI * 2   // Fase para el parpadeo (twinkle)
                }));

                // Habilitar el buscador ahora que tenemos los datos
                document.getElementById('searchInput').disabled = false;
                document.getElementById('searchBtn').disabled = false;

                // Iniciar la animación del mapa
                drawMap();

            } catch (error) {
                console.error("Error al cargar la base de datos de reclutas:", error);
                // Aquí podrías agregar lógica para mostrar un mensaje de error en pantalla
            }
        }

        // --- RENDERIZADO DEL MAPA ---
        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            animationTime += 0.1;

            users.forEach(user => {
                const px = user.x * canvas.width;
                const py = user.y * canvas.height;
                const isTarget = targetUser && targetUser.id === user.id;

                let alpha = 0.5 + (Math.sin(animationTime + user.phase) * 0.2 + 0.2);
                
                if (isTarget) {
                    const pulseRadius = 15 + Math.sin(animationTime * 4) * 5;
                    
                    ctx.beginPath();
                    ctx.arc(px, py, pulseRadius, 0, Math.PI * 2);
                    ctx.fillStyle = user.color + '40';
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(px, py, pulseRadius * 1.5, 0, Math.PI * 2);
                    ctx.strokeStyle = user.color + '80';
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    alpha = 1;
                }

                ctx.beginPath();
                ctx.arc(px, py, isTarget ? 3 : user.size, 0, Math.PI * 2);
                ctx.fillStyle = user.color;
                ctx.globalAlpha = alpha;
                ctx.fill();
                ctx.globalAlpha = 1.0;
            });

            requestAnimationFrame(drawMap);
        }

        // --- LÓGICA DE BÚSQUEDA ---
        function searchStar() {
            const inputVal = document.getElementById('searchInput').value.trim();
            if(!inputVal) return;

            const foundUser = users.find(u => u.id === inputVal);

            if (foundUser) {
                targetUser = foundUser;
                const px = foundUser.x * canvas.width;
                const py = foundUser.y * canvas.height;

                document.getElementById('tt-id').innerText = `URA-${foundUser.id}`;
                document.getElementById('tt-name').innerText = foundUser.name;
                document.getElementById('tt-coords').innerText = `x: ${foundUser.x.toFixed(4)} | y: ${foundUser.y.toFixed(4)}`;
                
                tooltip.style.borderColor = foundUser.color;
                tooltip.style.boxShadow = `0 0 20px ${foundUser.color}40`;
                document.getElementById('arrow-down').style.borderColor = foundUser.color;
                document.getElementById('arrow-up').style.borderColor = foundUser.color;

                const isNearTop = py < 120;

                if (isNearTop) {
                    tooltip.style.top = `${py + 25}px`;
                    tooltip.classList.remove('-translate-y-full', 'mt-[-20px]');
                    tooltip.classList.add('translate-y-0');
                    document.getElementById('arrow-down').classList.add('hidden');
                    document.getElementById('arrow-up').classList.remove('hidden');
                } else {
                    tooltip.style.top = `${py - 15}px`;
                    tooltip.classList.remove('translate-y-0');
                    tooltip.classList.add('-translate-y-full', 'mt-[-20px]');
                    document.getElementById('arrow-down').classList.remove('hidden');
                    document.getElementById('arrow-up').classList.add('hidden');
                }

                tooltip.style.left = `${px}px`;
                tooltip.classList.remove('hidden');
                setTimeout(() => tooltip.classList.add('opacity-100'), 10);
            } else {
                targetUser = null;
                tooltip.classList.add('hidden');
                tooltip.classList.remove('opacity-100');
                
                const inputEl = document.getElementById('searchInput');
                inputEl.classList.add('text-red-500');
                setTimeout(() => inputEl.classList.remove('text-red-500'), 800);
            }
        }

        // --- CERRAR CARTELITO ---
        canvas.addEventListener('click', () => {
            if(targetUser) {
                targetUser = null;
                tooltip.classList.add('hidden');
                tooltip.classList.remove('opacity-100');
                document.getElementById('searchInput').value = '';
            }
        });

        // --- INICIALIZAR ---
        // Llamamos a la función asincrónica al cargar el script
        loadUsers();

    </script>
</body>
</html>
